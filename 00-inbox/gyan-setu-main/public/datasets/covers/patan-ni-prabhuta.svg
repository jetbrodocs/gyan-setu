<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <linearGradient id="grad_patan_ni_prabhuta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E65100" />
      <stop offset="100%" stop-color="#F57C00" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="450" fill="url(#grad_patan_ni_prabhuta)" rx="6" ry="6" />

  <!-- Subtle top highlight -->
  <rect width="300" height="80" fill="white" opacity="0.06" rx="6" ry="6" />

  <!-- Decorative pattern (centred, upper area) -->
  
        <g opacity="0.18" stroke="#FFD54F" stroke-width="1.5" fill="none">
          <polygon points="150,60 200,110 150,160 100,110" />
          <polygon points="150,45 215,110 150,175 85,110" />
          <polygon points="150,30 230,110 150,190 70,110" />
          <line x1="150" y1="30" x2="150" y2="190" />
          <line x1="70" y1="110" x2="230" y2="110" />
        </g>

  <!-- Outer border frame -->
  <rect x="12" y="12" width="276" height="426" fill="none"
        stroke="#FFB300" stroke-width="1.5" rx="4" ry="4" opacity="0.7" />
  <!-- Inner border frame -->
  <rect x="18" y="18" width="264" height="414" fill="none"
        stroke="#FFD54F" stroke-width="0.6" rx="3" ry="3" opacity="0.4" />

  <!-- Horizontal rule above title block -->
  <line x1="36" y1="174" x2="264" y2="174"
        stroke="#FFD54F" stroke-width="0.8" opacity="0.5" />

  <!-- Book title -->
  <text
    x="150"
    y="194"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="bold"
    fill="white"
    letter-spacing="0.5"
  ><tspan x="150" dy="0">Patan ni</tspan><tspan x="150" dy="32">Prabhuta</tspan></text>

  <!-- Horizontal rule below title block -->
  <line x1="36" y1="262" x2="264" y2="262"
        stroke="#FFD54F" stroke-width="0.8" opacity="0.5" />

  <!-- Author name -->
  <text
    x="150"
    y="276"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="15"
    fill="#FFD54F"
    letter-spacing="0.3"
  ><tspan x="150" dy="0">K.M. Munshi</tspan></text>

  <!-- Language badge (bottom) -->
  <rect x="90" y="410" width="120" height="22" rx="11" ry="11"
        fill="white" opacity="0.15" />
  <text
    x="150"
    y="425"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    fill="white"
    opacity="0.9"
    letter-spacing="1"
  >GUJARATI</text>

  <!-- Corner ornament dots -->
  <circle cx="30"  cy="30"  r="3" fill="#FFD54F" opacity="0.5" />
  <circle cx="270" cy="30"  r="3" fill="#FFD54F" opacity="0.5" />
  <circle cx="30"  cy="420" r="3" fill="#FFD54F" opacity="0.5" />
  <circle cx="270" cy="420" r="3" fill="#FFD54F" opacity="0.5" />
</svg>