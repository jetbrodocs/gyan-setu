<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <linearGradient id="grad_godan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1B5E20" />
      <stop offset="100%" stop-color="#388E3C" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="450" fill="url(#grad_godan)" rx="6" ry="6" />

  <!-- Subtle top highlight -->
  <rect width="300" height="80" fill="white" opacity="0.06" rx="6" ry="6" />

  <!-- Decorative pattern (centred, upper area) -->
  
        <g opacity="0.18" stroke="#A5D6A7" stroke-width="1.5" fill="none">
          <ellipse cx="150" cy="110" rx="50" ry="25" />
          <ellipse cx="150" cy="110" rx="70" ry="35" />
          <ellipse cx="150" cy="110" rx="90" ry="45" transform="rotate(45,150,110)" />
          <ellipse cx="150" cy="110" rx="90" ry="45" transform="rotate(-45,150,110)" />
          <circle cx="150" cy="110" r="12" />
        </g>

  <!-- Outer border frame -->
  <rect x="12" y="12" width="276" height="426" fill="none"
        stroke="#66BB6A" stroke-width="1.5" rx="4" ry="4" opacity="0.7" />
  <!-- Inner border frame -->
  <rect x="18" y="18" width="264" height="414" fill="none"
        stroke="#A5D6A7" stroke-width="0.6" rx="3" ry="3" opacity="0.4" />

  <!-- Horizontal rule above title block -->
  <line x1="36" y1="190" x2="264" y2="190"
        stroke="#A5D6A7" stroke-width="0.8" opacity="0.5" />

  <!-- Book title -->
  <text
    x="150"
    y="210"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="bold"
    fill="white"
    letter-spacing="0.5"
  ><tspan x="150" dy="0">Godan</tspan></text>

  <!-- Horizontal rule below title block -->
  <line x1="36" y1="246" x2="264" y2="246"
        stroke="#A5D6A7" stroke-width="0.8" opacity="0.5" />

  <!-- Author name -->
  <text
    x="150"
    y="260"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="15"
    fill="#A5D6A7"
    letter-spacing="0.3"
  ><tspan x="150" dy="0">Premchand</tspan></text>

  <!-- Language badge (bottom) -->
  <rect x="90" y="410" width="120" height="22" rx="11" ry="11"
        fill="white" opacity="0.15" />
  <text
    x="150"
    y="425"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    fill="white"
    opacity="0.9"
    letter-spacing="1"
  >HINDI</text>

  <!-- Corner ornament dots -->
  <circle cx="30"  cy="30"  r="3" fill="#A5D6A7" opacity="0.5" />
  <circle cx="270" cy="30"  r="3" fill="#A5D6A7" opacity="0.5" />
  <circle cx="30"  cy="420" r="3" fill="#A5D6A7" opacity="0.5" />
  <circle cx="270" cy="420" r="3" fill="#A5D6A7" opacity="0.5" />
</svg>