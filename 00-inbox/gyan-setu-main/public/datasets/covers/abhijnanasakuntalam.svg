<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <linearGradient id="grad_abhijnanasakuntalam" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#880E4F" />
      <stop offset="100%" stop-color="#AD1457" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="450" fill="url(#grad_abhijnanasakuntalam)" rx="6" ry="6" />

  <!-- Subtle top highlight -->
  <rect width="300" height="80" fill="white" opacity="0.06" rx="6" ry="6" />

  <!-- Decorative pattern (centred, upper area) -->
  
        <g opacity="0.18" stroke="#F48FB1" stroke-width="1.5" fill="none">
          <line x1="150" y1="110" x2="225.0" y2="110.0" /><line x1="150" y1="110" x2="203.0" y2="163.0" /><line x1="150" y1="110" x2="150.0" y2="185.0" /><line x1="150" y1="110" x2="97.0" y2="163.0" /><line x1="150" y1="110" x2="75.0" y2="110.0" /><line x1="150" y1="110" x2="97.0" y2="57.0" /><line x1="150" y1="110" x2="150.0" y2="35.0" /><line x1="150" y1="110" x2="203.0" y2="57.0" />
          <circle cx="150" cy="110" r="30" />
          <circle cx="150" cy="110" r="55" />
          <circle cx="150" cy="110" r="75" />
        </g>

  <!-- Outer border frame -->
  <rect x="12" y="12" width="276" height="426" fill="none"
        stroke="#EC407A" stroke-width="1.5" rx="4" ry="4" opacity="0.7" />
  <!-- Inner border frame -->
  <rect x="18" y="18" width="264" height="414" fill="none"
        stroke="#F48FB1" stroke-width="0.6" rx="3" ry="3" opacity="0.4" />

  <!-- Horizontal rule above title block -->
  <line x1="36" y1="190" x2="264" y2="190"
        stroke="#F48FB1" stroke-width="0.8" opacity="0.5" />

  <!-- Book title -->
  <text
    x="150"
    y="210"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="bold"
    fill="white"
    letter-spacing="0.5"
  ><tspan x="150" dy="0">Abhijnanasakuntalam</tspan></text>

  <!-- Horizontal rule below title block -->
  <line x1="36" y1="246" x2="264" y2="246"
        stroke="#F48FB1" stroke-width="0.8" opacity="0.5" />

  <!-- Author name -->
  <text
    x="150"
    y="260"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="15"
    fill="#F48FB1"
    letter-spacing="0.3"
  ><tspan x="150" dy="0">Kalidasa</tspan></text>

  <!-- Language badge (bottom) -->
  <rect x="90" y="410" width="120" height="22" rx="11" ry="11"
        fill="white" opacity="0.15" />
  <text
    x="150"
    y="425"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    fill="white"
    opacity="0.9"
    letter-spacing="1"
  >SANSKRIT</text>

  <!-- Corner ornament dots -->
  <circle cx="30"  cy="30"  r="3" fill="#F48FB1" opacity="0.5" />
  <circle cx="270" cy="30"  r="3" fill="#F48FB1" opacity="0.5" />
  <circle cx="30"  cy="420" r="3" fill="#F48FB1" opacity="0.5" />
  <circle cx="270" cy="420" r="3" fill="#F48FB1" opacity="0.5" />
</svg>