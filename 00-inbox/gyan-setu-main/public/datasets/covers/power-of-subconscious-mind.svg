<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <linearGradient id="grad_power_of_subconscious_mind" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1565C0" />
      <stop offset="100%" stop-color="#1E88E5" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="450" fill="url(#grad_power_of_subconscious_mind)" rx="6" ry="6" />

  <!-- Subtle top highlight -->
  <rect width="300" height="80" fill="white" opacity="0.06" rx="6" ry="6" />

  <!-- Decorative pattern (centred, upper area) -->
  
        <g opacity="0.15" stroke="#90CAF9" stroke-width="1" fill="none">
          <line x1="60" y1="40" x2="60" y2="180" /><line x1="105" y1="40" x2="105" y2="180" /><line x1="150" y1="40" x2="150" y2="180" /><line x1="195" y1="40" x2="195" y2="180" /><line x1="240" y1="40" x2="240" y2="180" />
          <line x1="60" y1="60" x2="240" y2="60" /><line x1="60" y1="100" x2="240" y2="100" /><line x1="60" y1="140" x2="240" y2="140" /><line x1="60" y1="180" x2="240" y2="180" />
          <circle cx="150" cy="110" r="40" stroke-width="2" />
          <circle cx="150" cy="110" r="25" />
        </g>

  <!-- Outer border frame -->
  <rect x="12" y="12" width="276" height="426" fill="none"
        stroke="#42A5F5" stroke-width="1.5" rx="4" ry="4" opacity="0.7" />
  <!-- Inner border frame -->
  <rect x="18" y="18" width="264" height="414" fill="none"
        stroke="#90CAF9" stroke-width="0.6" rx="3" ry="3" opacity="0.4" />

  <!-- Horizontal rule above title block -->
  <line x1="36" y1="146" x2="264" y2="146"
        stroke="#90CAF9" stroke-width="0.8" opacity="0.5" />

  <!-- Book title -->
  <text
    x="150"
    y="166"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="bold"
    fill="white"
    letter-spacing="0.5"
  ><tspan x="150" dy="0">The Power of</tspan><tspan x="150" dy="28">Your</tspan><tspan x="150" dy="28">Subconscious</tspan><tspan x="150" dy="28">Mind</tspan></text>

  <!-- Horizontal rule below title block -->
  <line x1="36" y1="282" x2="264" y2="282"
        stroke="#90CAF9" stroke-width="0.8" opacity="0.5" />

  <!-- Author name -->
  <text
    x="150"
    y="296"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="15"
    fill="#90CAF9"
    letter-spacing="0.3"
  ><tspan x="150" dy="0">Joseph Murphy</tspan></text>

  <!-- Language badge (bottom) -->
  <rect x="90" y="410" width="120" height="22" rx="11" ry="11"
        fill="white" opacity="0.15" />
  <text
    x="150"
    y="425"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    fill="white"
    opacity="0.9"
    letter-spacing="1"
  >ENGLISH</text>

  <!-- Corner ornament dots -->
  <circle cx="30"  cy="30"  r="3" fill="#90CAF9" opacity="0.5" />
  <circle cx="270" cy="30"  r="3" fill="#90CAF9" opacity="0.5" />
  <circle cx="30"  cy="420" r="3" fill="#90CAF9" opacity="0.5" />
  <circle cx="270" cy="420" r="3" fill="#90CAF9" opacity="0.5" />
</svg>