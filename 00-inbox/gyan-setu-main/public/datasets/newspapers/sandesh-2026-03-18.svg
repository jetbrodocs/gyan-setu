<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1100" viewBox="0 0 800 1100">
  <rect width="800" height="1100" fill="#FFFFFF"/>

  <!-- Top rule -->
  <line x1="30" y1="20" x2="770" y2="20" stroke="#1B2A4A" stroke-width="4"/>
  <line x1="30" y1="24" x2="770" y2="24" stroke="#1B2A4A" stroke-width="1"/>

  <!-- Price and page info -->
  <text x="35" y="42" font-family="Georgia, serif" font-size="10" fill="#1B2A4A">Est. 1923</text>
  <text x="765" y="42" font-family="Georgia, serif" font-size="10" fill="#1B2A4A" text-anchor="end">₹5 | Page 1 of 32</text>

  <!-- Masthead -->
  <text x="400" y="88" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="bold" fill="#1B2A4A" text-anchor="middle" letter-spacing="8">SANDESH</text>

  <!-- Subline -->
  <line x1="30" y1="100" x2="770" y2="100" stroke="#1B2A4A" stroke-width="1.5"/>
  <text x="400" y="117" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">Ahmedabad Edition | Wednesday, 18 March 2026 | Vol. 103, No. 77 | www.sandesh.com</text>
  <line x1="30" y1="125" x2="770" y2="125" stroke="#1B2A4A" stroke-width="2.5"/>

  <!-- Large photo block spanning 2 columns -->
  <rect x="35" y="140" width="480" height="220" fill="#C8C8C8" rx="2"/>
  <text x="275" y="255" font-family="Arial, sans-serif" font-size="16" fill="#777" text-anchor="middle">Photo</text>
  <text x="37" y="375" font-family="Arial, sans-serif" font-size="9" fill="#888">File Photo: Mahatma Mandir Convention Centre, Gandhinagar</text>

  <!-- Main headline next to photo -->
  <text x="530" y="165" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1B2A4A">International</text>
  <text x="530" y="192" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1B2A4A">Trade Summit</text>
  <text x="530" y="219" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1B2A4A">Begins Today</text>
  <text x="530" y="246" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1B2A4A">at Mahatma</text>
  <text x="530" y="273" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1B2A4A">Mandir</text>

  <text x="530" y="300" font-family="Arial, sans-serif" font-size="10" fill="#666">Over 40 countries participating</text>
  <text x="530" y="313" font-family="Arial, sans-serif" font-size="10" fill="#666">in the 3-day event. Gujarat aims</text>
  <text x="530" y="326" font-family="Arial, sans-serif" font-size="10" fill="#666">to attract ₹50,000 crore in new</text>
  <text x="530" y="339" font-family="Arial, sans-serif" font-size="10" fill="#666">investment commitments across</text>
  <text x="530" y="352" font-family="Arial, sans-serif" font-size="10" fill="#666">manufacturing, IT, and renewable</text>
  <text x="530" y="365" font-family="Arial, sans-serif" font-size="10" fill="#666">energy sectors.</text>

  <!-- Section divider -->
  <line x1="30" y1="385" x2="770" y2="385" stroke="#1B2A4A" stroke-width="1"/>

  <!-- Three column layout -->
  <!-- Column 1 -->
  <text x="35" y="410" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1B2A4A">Ahmedabad Airport</text>
  <text x="35" y="430" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1B2A4A">Records Highest-Ever</text>
  <text x="35" y="450" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1B2A4A">Monthly Passengers</text>

  <text x="35" y="472" font-family="Arial, sans-serif" font-size="10" fill="#666">Sardar Vallabhbhai Patel International</text>
  <text x="35" y="485" font-family="Arial, sans-serif" font-size="10" fill="#666">Airport recorded 32 lakh passengers in</text>
  <text x="35" y="498" font-family="Arial, sans-serif" font-size="10" fill="#666">February 2026, the highest monthly</text>
  <text x="35" y="511" font-family="Arial, sans-serif" font-size="10" fill="#666">figure in the airport's history. The new</text>
  <text x="35" y="524" font-family="Arial, sans-serif" font-size="10" fill="#666">Terminal 2 handled 60% of the traffic.</text>
  <text x="35" y="537" font-family="Arial, sans-serif" font-size="10" fill="#666">International routes to Singapore and</text>
  <text x="35" y="550" font-family="Arial, sans-serif" font-size="10" fill="#666">Dubai contributed significantly to the</text>
  <text x="35" y="563" font-family="Arial, sans-serif" font-size="10" fill="#666">growth, officials stated.</text>

  <line x1="35" y1="575" x2="265" y2="575" stroke="#ddd" stroke-width="0.5"/>

  <text x="35" y="595" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1B2A4A">Civic Body Approves ₹200 Cr</text>
  <text x="35" y="611" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1B2A4A">for Stormwater Drains</text>

  <text x="35" y="631" font-family="Arial, sans-serif" font-size="10" fill="#666">The AMC standing committee approved</text>
  <text x="35" y="644" font-family="Arial, sans-serif" font-size="10" fill="#666">₹200 crore for upgrading stormwater</text>
  <text x="35" y="657" font-family="Arial, sans-serif" font-size="10" fill="#666">drainage systems in the western zone</text>
  <text x="35" y="670" font-family="Arial, sans-serif" font-size="10" fill="#666">to prevent flooding during monsoon.</text>

  <!-- Column divider -->
  <line x1="275" y1="395" x2="275" y2="720" stroke="#1B2A4A" stroke-width="0.5"/>

  <!-- Column 2 -->
  <text x="285" y="410" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1B2A4A">State Launches Free</text>
  <text x="285" y="430" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1B2A4A">Health Check-Up Drive</text>

  <rect x="285" y="445" width="220" height="120" fill="#D5D5D5" rx="2"/>
  <text x="395" y="510" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Photo</text>

  <text x="285" y="585" font-family="Arial, sans-serif" font-size="10" fill="#666">The Gujarat Health Department has</text>
  <text x="285" y="598" font-family="Arial, sans-serif" font-size="10" fill="#666">launched a free annual health check-up</text>
  <text x="285" y="611" font-family="Arial, sans-serif" font-size="10" fill="#666">campaign covering 8,000 villages across</text>
  <text x="285" y="624" font-family="Arial, sans-serif" font-size="10" fill="#666">the state. Mobile health vans equipped</text>
  <text x="285" y="637" font-family="Arial, sans-serif" font-size="10" fill="#666">with diagnostic equipment will visit</text>
  <text x="285" y="650" font-family="Arial, sans-serif" font-size="10" fill="#666">each village over the next 6 months.</text>
  <text x="285" y="663" font-family="Arial, sans-serif" font-size="10" fill="#666">Screening includes diabetes, blood</text>
  <text x="285" y="676" font-family="Arial, sans-serif" font-size="10" fill="#666">pressure, and eye tests for citizens</text>
  <text x="285" y="689" font-family="Arial, sans-serif" font-size="10" fill="#666">above 40 years of age.</text>

  <!-- Column divider -->
  <line x1="515" y1="395" x2="515" y2="720" stroke="#1B2A4A" stroke-width="0.5"/>

  <!-- Column 3 -->
  <rect x="525" y="400" width="240" height="140" fill="#D0D0D0" rx="2"/>
  <text x="645" y="475" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Photo</text>

  <text x="525" y="560" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1B2A4A">Vadodara-Mumbai</text>
  <text x="525" y="578" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1B2A4A">Expressway 70% Done</text>

  <text x="525" y="598" font-family="Arial, sans-serif" font-size="10" fill="#666">The under-construction Vadodara-</text>
  <text x="525" y="611" font-family="Arial, sans-serif" font-size="10" fill="#666">Mumbai expressway has reached 70%</text>
  <text x="525" y="624" font-family="Arial, sans-serif" font-size="10" fill="#666">completion, with the Gujarat section</text>
  <text x="525" y="637" font-family="Arial, sans-serif" font-size="10" fill="#666">almost entirely ready. The 380-km</text>
  <text x="525" y="650" font-family="Arial, sans-serif" font-size="10" fill="#666">highway will reduce travel time</text>
  <text x="525" y="663" font-family="Arial, sans-serif" font-size="10" fill="#666">between the two cities to under 4</text>
  <text x="525" y="676" font-family="Arial, sans-serif" font-size="10" fill="#666">hours. Full opening is expected by</text>
  <text x="525" y="689" font-family="Arial, sans-serif" font-size="10" fill="#666">December 2026.</text>

  <!-- Bottom section divider -->
  <line x1="30" y1="730" x2="770" y2="730" stroke="#1B2A4A" stroke-width="1.5"/>

  <!-- Bottom section -->
  <text x="35" y="755" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1B2A4A">BUSINESS &amp; ECONOMY</text>

  <text x="35" y="780" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Sensex Touches All-Time High of 92,450; Gujarat Stocks Lead Rally</text>
  <text x="35" y="798" font-family="Arial, sans-serif" font-size="10" fill="#666">The BSE Sensex touched an all-time high of 92,450 on Tuesday, driven by strong performance from</text>
  <text x="35" y="811" font-family="Arial, sans-serif" font-size="10" fill="#666">Gujarat-based companies in pharma, chemicals, and textiles sectors.</text>

  <line x1="30" y1="825" x2="770" y2="825" stroke="#ccc" stroke-width="0.5"/>

  <text x="35" y="845" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Adani Group Announces ₹10,000 Crore Green Hydrogen Plant in Kutch</text>
  <text x="35" y="863" font-family="Arial, sans-serif" font-size="10" fill="#666">Adani Green Energy has announced plans to set up a ₹10,000 crore green hydrogen manufacturing</text>
  <text x="35" y="876" font-family="Arial, sans-serif" font-size="10" fill="#666">facility in Mundra, Kutch. The plant will be operational by 2028 and create 5,000 direct jobs.</text>

  <line x1="30" y1="890" x2="770" y2="890" stroke="#ccc" stroke-width="0.5"/>

  <text x="35" y="910" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Rupee Strengthens to 81.20 Against US Dollar Amid FII Inflows</text>
  <text x="35" y="928" font-family="Arial, sans-serif" font-size="10" fill="#666">The Indian rupee appreciated to 81.20 against the US dollar, its strongest level in 18 months,</text>
  <text x="35" y="941" font-family="Arial, sans-serif" font-size="10" fill="#666">supported by sustained foreign institutional investor inflows into Indian equity markets.</text>

  <!-- Bottom banner -->
  <line x1="30" y1="960" x2="770" y2="960" stroke="#1B2A4A" stroke-width="1"/>
  <rect x="30" y="965" width="740" height="50" fill="#1B2A4A" rx="2"/>
  <text x="400" y="995" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ADVERTISEMENT: Bank of Baroda — India's International Bank | www.bankofbaroda.in</text>

  <!-- Bottom rules -->
  <line x1="30" y1="1025" x2="770" y2="1025" stroke="#1B2A4A" stroke-width="0.5"/>
  <text x="400" y="1042" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">Printed and Published by Sandesh Ltd., Sandesh Bhavan, Lad Society Road, Ahmedabad-380054 | Editor: F.B. Patel</text>
  <line x1="30" y1="1055" x2="770" y2="1055" stroke="#1B2A4A" stroke-width="1.5"/>
</svg>