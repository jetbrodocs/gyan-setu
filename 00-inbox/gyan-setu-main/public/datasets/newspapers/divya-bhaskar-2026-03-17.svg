<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1100" viewBox="0 0 800 1100">
  <rect width="800" height="1100" fill="#FFFFFF"/>

  <!-- Top rule -->
  <line x1="30" y1="18" x2="770" y2="18" stroke="#CC0000" stroke-width="4"/>

  <!-- Price and page info -->
  <text x="35" y="38" font-family="Arial, sans-serif" font-size="10" fill="#CC0000" font-weight="bold">HINDI DAILY</text>
  <text x="765" y="38" font-family="Georgia, serif" font-size="10" fill="#333" text-anchor="end">₹6 | Page 1 of 24</text>

  <!-- Masthead -->
  <rect x="30" y="45" width="740" height="55" fill="#CC0000" rx="3"/>
  <text x="400" y="85" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="5">DIVYA BHASKAR</text>

  <!-- Subline -->
  <text x="400" y="117" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">Gandhinagar Edition | Tuesday, 17 March 2026 | Year 23, Issue 76 | www.divyabhaskar.co.in</text>
  <line x1="30" y1="125" x2="770" y2="125" stroke="#CC0000" stroke-width="2"/>

  <!-- Main headline -->
  <text x="400" y="165" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Gandhinagar Municipal Corporation</text>
  <text x="400" y="197" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Approves ₹3,500 Cr Annual Budget</text>

  <text x="400" y="220" font-family="Arial, sans-serif" font-size="13" fill="#CC0000" text-anchor="middle" font-weight="bold">40% allocation for infrastructure; ₹450 crore earmarked for green initiatives</text>

  <line x1="100" y1="235" x2="700" y2="235" stroke="#CC0000" stroke-width="0.5"/>

  <!-- Three column layout -->
  <!-- Column 1 -->
  <text x="35" y="265" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1a1a1a">Gandhinagar Smart City</text>
  <text x="35" y="283" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1a1a1a">Digital Platform Wins</text>
  <text x="35" y="301" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1a1a1a">National e-Gov Award</text>

  <text x="35" y="323" font-family="Arial, sans-serif" font-size="10" fill="#666">The Gandhinagar Smart City digital</text>
  <text x="35" y="336" font-family="Arial, sans-serif" font-size="10" fill="#666">governance platform has been awarded</text>
  <text x="35" y="349" font-family="Arial, sans-serif" font-size="10" fill="#666">the National e-Governance Gold Award</text>
  <text x="35" y="362" font-family="Arial, sans-serif" font-size="10" fill="#666">for excellence in citizen services. The</text>
  <text x="35" y="375" font-family="Arial, sans-serif" font-size="10" fill="#666">platform processes over 5,000 service</text>
  <text x="35" y="388" font-family="Arial, sans-serif" font-size="10" fill="#666">requests daily with an average resolution</text>
  <text x="35" y="401" font-family="Arial, sans-serif" font-size="10" fill="#666">time of 48 hours. Birth certificates,</text>
  <text x="35" y="414" font-family="Arial, sans-serif" font-size="10" fill="#666">property tax payments, and building</text>
  <text x="35" y="427" font-family="Arial, sans-serif" font-size="10" fill="#666">permits are the most-used services.</text>

  <line x1="35" y1="440" x2="265" y2="440" stroke="#ddd" stroke-width="0.5"/>

  <rect x="35" y="452" width="230" height="130" fill="#D0D0D0" rx="2"/>
  <text x="150" y="522" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Photo</text>

  <text x="35" y="602" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Free Aadhaar Update</text>
  <text x="35" y="618" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Camps Across Gandhinagar</text>

  <text x="35" y="638" font-family="Arial, sans-serif" font-size="10" fill="#666">UIDAI has set up free Aadhaar update</text>
  <text x="35" y="651" font-family="Arial, sans-serif" font-size="10" fill="#666">camps at 25 locations in Gandhinagar</text>
  <text x="35" y="664" font-family="Arial, sans-serif" font-size="10" fill="#666">for address and biometric updates.</text>
  <text x="35" y="677" font-family="Arial, sans-serif" font-size="10" fill="#666">Camps will run until March 31, 2026.</text>
  <text x="35" y="690" font-family="Arial, sans-serif" font-size="10" fill="#666">No appointment necessary for walk-in.</text>

  <!-- Column divider -->
  <line x1="275" y1="250" x2="275" y2="720" stroke="#CC0000" stroke-width="0.5"/>

  <!-- Column 2 -->
  <rect x="285" y="255" width="220" height="160" fill="#D5D5D5" rx="2"/>
  <text x="395" y="340" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Photo</text>

  <text x="285" y="435" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1a1a1a">Sector 21 Market Gets</text>
  <text x="285" y="453" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1a1a1a">Complete Makeover</text>

  <text x="285" y="475" font-family="Arial, sans-serif" font-size="10" fill="#666">The iconic Sector 21 market area in</text>
  <text x="285" y="488" font-family="Arial, sans-serif" font-size="10" fill="#666">Gandhinagar has undergone a complete</text>
  <text x="285" y="501" font-family="Arial, sans-serif" font-size="10" fill="#666">renovation with new pedestrian walkways,</text>
  <text x="285" y="514" font-family="Arial, sans-serif" font-size="10" fill="#666">LED street lighting, and covered parking</text>
  <text x="285" y="527" font-family="Arial, sans-serif" font-size="10" fill="#666">for 500 vehicles. The smart market</text>
  <text x="285" y="540" font-family="Arial, sans-serif" font-size="10" fill="#666">features digital directories, free Wi-Fi,</text>
  <text x="285" y="553" font-family="Arial, sans-serif" font-size="10" fill="#666">and QR code-based shop navigation.</text>
  <text x="285" y="566" font-family="Arial, sans-serif" font-size="10" fill="#666">The ₹85 crore project was completed</text>
  <text x="285" y="579" font-family="Arial, sans-serif" font-size="10" fill="#666">in 14 months, two months ahead of</text>
  <text x="285" y="592" font-family="Arial, sans-serif" font-size="10" fill="#666">the original schedule.</text>

  <line x1="285" y1="605" x2="505" y2="605" stroke="#ddd" stroke-width="0.5"/>

  <text x="285" y="625" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">New Children's Park Opens</text>
  <text x="285" y="641" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Near Capital Complex</text>

  <text x="285" y="661" font-family="Arial, sans-serif" font-size="10" fill="#666">A new 10-acre children's park with</text>
  <text x="285" y="674" font-family="Arial, sans-serif" font-size="10" fill="#666">adventure sports, amphitheatre, and</text>
  <text x="285" y="687" font-family="Arial, sans-serif" font-size="10" fill="#666">botanical garden has opened near the</text>
  <text x="285" y="700" font-family="Arial, sans-serif" font-size="10" fill="#666">Gujarat Capital Complex in Sector 10.</text>

  <!-- Column divider -->
  <line x1="515" y1="250" x2="515" y2="720" stroke="#CC0000" stroke-width="0.5"/>

  <!-- Column 3 -->
  <text x="525" y="268" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1a1a1a">BRTS Network to Add</text>
  <text x="525" y="286" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1a1a1a">3 New Routes Connecting</text>
  <text x="525" y="304" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1a1a1a">Gandhinagar Sectors</text>

  <text x="525" y="326" font-family="Arial, sans-serif" font-size="10" fill="#666">The Gandhinagar BRTS system will</text>
  <text x="525" y="339" font-family="Arial, sans-serif" font-size="10" fill="#666">add three new routes connecting</text>
  <text x="525" y="352" font-family="Arial, sans-serif" font-size="10" fill="#666">Sectors 1 through 30 with GIFT City</text>
  <text x="525" y="365" font-family="Arial, sans-serif" font-size="10" fill="#666">and the Gandhinagar railway station.</text>
  <text x="525" y="378" font-family="Arial, sans-serif" font-size="10" fill="#666">Electric buses will operate every 10</text>
  <text x="525" y="391" font-family="Arial, sans-serif" font-size="10" fill="#666">minutes during peak hours. Monthly</text>
  <text x="525" y="404" font-family="Arial, sans-serif" font-size="10" fill="#666">passes will cost just ₹500 for</text>
  <text x="525" y="417" font-family="Arial, sans-serif" font-size="10" fill="#666">unlimited travel across all routes.</text>

  <line x1="525" y1="432" x2="765" y2="432" stroke="#ddd" stroke-width="0.5"/>

  <rect x="525" y="445" width="240" height="130" fill="#D0D0D0" rx="2"/>
  <text x="645" y="515" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">Photo</text>

  <text x="525" y="595" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1a1a1a">Gold Prices Drop ₹500</text>
  <text x="525" y="611" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1a1a1a">Per 10 Grams in Gujarat</text>

  <text x="525" y="631" font-family="Arial, sans-serif" font-size="10" fill="#666">Gold prices in Gujarat fell by ₹500</text>
  <text x="525" y="644" font-family="Arial, sans-serif" font-size="10" fill="#666">per 10 grams to ₹68,200 on Tuesday</text>
  <text x="525" y="657" font-family="Arial, sans-serif" font-size="10" fill="#666">as global demand weakened. Silver</text>
  <text x="525" y="670" font-family="Arial, sans-serif" font-size="10" fill="#666">also declined by ₹800 to ₹82,500</text>
  <text x="525" y="683" font-family="Arial, sans-serif" font-size="10" fill="#666">per kg. Jewellers expect prices to</text>
  <text x="525" y="696" font-family="Arial, sans-serif" font-size="10" fill="#666">stabilize ahead of the wedding season.</text>

  <!-- Bottom section divider -->
  <line x1="30" y1="730" x2="770" y2="730" stroke="#CC0000" stroke-width="1.5"/>

  <!-- Bottom section -->
  <text x="35" y="755" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#CC0000">NATIONAL NEWS</text>

  <text x="35" y="780" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">India's GDP Growth Projected at 7.2% for FY2026-27 by RBI</text>
  <text x="35" y="798" font-family="Arial, sans-serif" font-size="10" fill="#666">The Reserve Bank of India has projected GDP growth at 7.2% for FY2026-27, citing robust domestic</text>
  <text x="35" y="811" font-family="Arial, sans-serif" font-size="10" fill="#666">consumption, strong services sector performance, and increasing manufacturing output.</text>

  <line x1="30" y1="825" x2="770" y2="825" stroke="#ccc" stroke-width="0.5"/>

  <text x="35" y="845" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">Supreme Court Directs States to Implement Right to Clean Air Guidelines Within 6 Months</text>
  <text x="35" y="863" font-family="Arial, sans-serif" font-size="10" fill="#666">The Supreme Court has directed all states to implement comprehensive clean air action plans within</text>
  <text x="35" y="876" font-family="Arial, sans-serif" font-size="10" fill="#666">6 months, mandating real-time air quality monitoring at district headquarters.</text>

  <line x1="30" y1="890" x2="770" y2="890" stroke="#ccc" stroke-width="0.5"/>

  <text x="35" y="910" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#1a1a1a">UPI Transactions Cross 20 Billion in February 2026, Setting New Monthly Record</text>
  <text x="35" y="928" font-family="Arial, sans-serif" font-size="10" fill="#666">India's Unified Payments Interface processed over 20 billion transactions in February 2026, with a</text>
  <text x="35" y="941" font-family="Arial, sans-serif" font-size="10" fill="#666">total value exceeding ₹22 lakh crore. Gujarat contributed 8% of the national UPI volume.</text>

  <!-- Bottom banner -->
  <line x1="30" y1="960" x2="770" y2="960" stroke="#CC0000" stroke-width="1"/>
  <rect x="30" y="965" width="740" height="50" fill="#CC0000" rx="2"/>
  <text x="400" y="995" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">ADVERTISEMENT: Amul — The Taste of India | www.amul.com</text>

  <!-- Bottom rules -->
  <line x1="30" y1="1025" x2="770" y2="1025" stroke="#CC0000" stroke-width="0.5"/>
  <text x="400" y="1042" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">Printed and Published by D.B. Corp Ltd., Bhaskar House, Nr. Balol Nagar, Ahmedabad | Editor: S. Mishra | RNI No. GUJTHI/2003/11651</text>
  <line x1="30" y1="1055" x2="770" y2="1055" stroke="#CC0000" stroke-width="1"/>
</svg>